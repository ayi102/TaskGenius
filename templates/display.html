<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TaskGenius</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/display.css') }}">
</head>
<body>
  <header class="display-header">
    <div class="header-side header-left">
      {% if lan_ip %}
        <div class="lan-url">tasks @ {{ lan_ip }}:{{ port }}</div>
      {% endif %}
    </div>
    <div class="brand">
      <div class="brand-name">TaskGenius</div>
      <div class="brand-by">by ayi102</div>
    </div>
    <div class="header-side header-meta">
      <span id="date" class="date"></span>
      <span class="clock" id="clock"></span>
    </div>
  </header>

  <main id="board" class="board" aria-live="polite">
    <p class="loading">Loading…</p>
  </main>
  <footer id="week-strip" class="week-strip" aria-label="This week"></footer>

  <script src="{{ url_for('static', filename='js/display.js') }}"></script>
</body>
</html>
